<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Extension Receiver</title>
  <style>
    body {
      width: 400px;
      min-height: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      font-size: 14px;
    }
    
    h1 {
      margin: 0 0 16px 0;
      font-size: 18px;
      font-weight: 600;
    }
    
    .controls {
      margin-bottom: 16px;
      display: flex;
      gap: 8px;
    }
    
    button {
      padding: 8px 16px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      font-size: 13px;
    }
    
    button:hover {
      background: #f5f5f5;
    }
    
    #messages {
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 12px;
      max-height: 400px;
      overflow-y: auto;
      background: #f9f9f9;
    }
    
    .message {
      padding: 8px;
      margin-bottom: 8px;
      background: white;
      border-radius: 4px;
      border-left: 3px solid #4CAF50;
    }
    
    .message-time {
      font-size: 11px;
      color: #666;
      margin-bottom: 4px;
    }
    
    .message-sender {
      font-size: 11px;
      color: #999;
      font-family: monospace;
    }
    
    .message-data {
      margin-top: 4px;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    
    .empty-state {
      text-align: center;
      color: #999;
      padding: 32px;
    }
  </style>
</head>
<body>
  <h1>📥 Extension Receiver</h1>
  
  <div class="controls">
    <button id="refresh">Refresh</button>
    <button id="clear">Clear All</button>
  </div>
  
  <div id="messages">
    <div class="empty-state">No messages received yet</div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
