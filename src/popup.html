<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Capture Status</title>
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 13px;
    }
    .indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      background: gray;
    }
    .online { background: #34c759; }
    .offline { background: #ff3b30; }
    .btn {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      cursor: pointer;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #f9f9f9;
    }
    .queue-count { font-weight: bold; color: #007aff; }
  </style>
</head>
<body>
  <h3>📥 Capture Status</h3>
  <div class="status-row">
    <span>Debugger:</span>
    <span><span id="debugger-led" class="indicator"></span> <span id="debugger-text">Checking...</span></span>
  </div>
  <div class="status-row">
    <span>Backend:</span>
    <span><span id="backend-led" class="indicator"></span> <span id="backend-text">Unknown</span></span>
  </div>
  <div class="status-row">
    <span>Queue:</span>
    <span id="queue-count" class="queue-count">0 pending</span>
  </div>
  <button id="open-options" class="btn">Open Settings</button>
  <script src="popup.js"></script>
</body>
</html>
